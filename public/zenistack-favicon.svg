<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background rounded square -->
  <rect width="512" height="512" rx="96" fill="#111111"/>

  <!-- Subtle inner glow -->
  <rect width="512" height="512" rx="96" fill="url(#glow)" opacity="0.4"/>

  <!-- Top bar — full width, full opacity -->
  <rect x="88" y="148" width="336" height="68" rx="34" fill="#f97316"/>

  <!-- Middle bar — medium width, medium opacity -->
  <rect x="88" y="254" width="232" height="68" rx="34" fill="#f97316" opacity="0.72"/>

  <!-- Bottom bar — short, low opacity -->
  <rect x="88" y="360" width="140" height="68" rx="34" fill="#f97316" opacity="0.40"/>

  <defs>
    <radialGradient id="glow" cx="50%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#f97316" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#f97316" stop-opacity="0"/>
    </radialGradient>
  </defs>
</svg>
